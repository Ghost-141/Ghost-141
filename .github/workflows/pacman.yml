name: Generate pacman animation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: pacman-graph
  cancel-in-progress: true

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Generate pacman graph
        uses: abozanona/pacman-contribution-graph@v5.0.0
        with:
          github_user_name: Ghost-141
          games: pacman
        env:
          NODE_OPTIONS: "--max-old-space-size=16384"
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Check generated files
        run: |
          echo "Files generated:"
          find . -maxdepth 3 -type f
          echo "Dist folder:"
          ls -la dist || true

      - name: Stop if dist was not generated
        run: |
          if [ ! -d dist ]; then
            echo "dist folder was not generated. Pacman generation failed before deploy."
            exit 1
          fi

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
